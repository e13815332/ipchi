name: Build iOS IPA
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      - name: Build IPA
        working-directory: ios
        run: |
          xcodebuild archive \
            -project Cfip.xcodeproj \
            -scheme Cfip \
            -archivePath build/Cfip.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO
          mkdir -p Payload
          cp -R build/Cfip.xcarchive/Products/Applications/Cfip.app Payload/
          zip -r Cfip.ipa Payload
          rm -rf Payload          
      - uses: actions/upload-artifact@v4
        with:
          name: Cfip.ipa
          path: ios/Cfip.ipa
