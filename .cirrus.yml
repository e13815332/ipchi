# Cirrus CI configuration for building iOS IPA
# Free for public repos, 30 min macOS limit
# https://cirrus-ci.org

macos_instance:
  image: ghcr.io/cirruslabs/macos-ventura-xcode:15.0

task:
  name: Build iOS IPA
  env:
    GO_VERSION: "1.22"
  build_script: |
    # Checkout is automatic
    echo "=== Building Cfip.xcframework ==="
    go install golang.org/x/mobile/cmd/gomobile@latest
    go install golang.org/x/mobile/cmd/gobind@latest
    ~/go/bin/gomobile init
    
    ~/go/bin/gomobile bind -target ios -o ios/Cfip.xcframework .
    
    echo "=== Building IPA ==="
    cd ios
    xcodebuild archive \
      -project Cfip.xcodeproj \
      -scheme Cfip \
      -archivePath build/Cfip.xcarchive \
      -sdk iphoneos \
      -configuration Release \
      CODE_SIGNING_ALLOWED=NO \
      CODE_SIGNING_REQUIRED=NO \
      CODE_SIGN_IDENTITY="" \
      DEVELOPMENT_TEAM="" \
      ONLY_ACTIVE_ARCH=NO
    
    # Package as IPA
    mkdir -p Payload
    cp -R build/Cfip.xcarchive/Products/Applications/Cfip.app Payload/
    zip -r Cfip.ipa Payload
    rm -rf Payload
    
    echo "=== IPA built ==="
    ls -lh Cfip.ipa
  
  ipa_artifacts:
    path: "ios/Cfip.ipa"
    type: application/octet-stream
