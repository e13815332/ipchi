workflows:
  ios-build:
    name: Build iOS IPA
    environment:
      vars:
        GO_VERSION: "1.22"
      xcode: 15.4
    scripts:
      - name: Install gomobile
        script: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
      - name: Build xcframework
        script: |
          gomobile bind -target ios -o ios/Cfip.xcframework .
      - name: Build IPA
        script: |
          cd ios
          xcodebuild archive \
            -project Cfip.xcodeproj \
            -scheme Cfip \
            -archivePath build/Cfip.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
          # Package IPA
          mkdir -p Payload
          cp -R build/Cfip.xcarchive/Products/Applications/Cfip.app Payload/
          zip -r Cfip.ipa Payload
          rm -rf Payload
          ls -lh Cfip.ipa
    artifacts:
      - ios/Cfip.ipa
